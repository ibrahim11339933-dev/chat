<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private P2P | Copy Button</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b141a; --primary: #00a884; --panel: #111b21; --text: #e9edef; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #auth { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 15px; text-align: center; width: 80%; max-width: 300px; }
        
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; background: #202c33; font-size: 15px; }
        .mine { align-self: flex-end; background: #005c4b; }
        
        /* منطقة الكود مع علامة النسخ */
        .id-section { background: #202c33; padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        .copy-container { 
            display: inline-flex; 
            align-items: center; 
            background: #2a3942; 
            padding: 5px 15px; 
            border-radius: 8px; 
            border: 1px solid var(--primary); 
            cursor: pointer;
            margin-top: 8px;
            transition: 0.3s;
        }
        .copy-container:hover { background: #32444f; }
        .id-text { font-family: monospace; color: var(--primary); font-size: 16px; margin-left: 10px; }
        .copy-icon { font-size: 18px; }

        .controls { padding: 10px; background: var(--panel); display: flex; gap: 8px; align-items: center; }
        input { background: #2a3942; border: none; padding: 10px; border-radius: 8px; color: white; outline: none; }
        button { cursor: pointer; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="login-box">
            <h2 style="color: var(--primary)">الركن الخاص 🔒</h2>
            <input type="password" id="passInput" placeholder="كلمة السر">
            <button onclick="checkPass()" style="width:100%; margin-top:15px">دخول</button>
        </div>
    </div>

    <div id="chat-area">
        <div class="id-section">
            <div id="status">كود جهازك (اضغط للنسخ):</div>
            <div class="copy-container" onclick="copyMyId()">
                <span class="id-text" id="my-id-display">-- جاري التحميل --</span>
                <span class="copy-icon">📋</span>
            </div>
        </div>

        <div class="controls" id="connect-controls">
            <input type="text" id="remoteId" style="flex:1" placeholder="حط كود الطرف التاني">
            <button onclick="connectToPeer()">اتصال ✅</button>
        </div>

        <div id="messages"></div>

        <div class="controls">
            <input type="file" id="fileIn" hidden onchange="sendFile(this.files[0])">
            <button onclick="document.getElementById('fileIn').click()">🖼️</button>
            <input type="text" id="msgIn" style="flex:1" placeholder="اكتب رسالة...">
            <button id="micBtn">🎤</button>
            <button onclick="sendMsg()">🚀</button>
        </div>
    </div>

    <script>
        let peer, conn;
        const pass = "3117";

        function checkPass() {
            if(document.getElementById('passInput').value === pass) {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('chat-area').style.display = 'flex';
                initPeer();
            } else { alert("كلمة السر غلط!"); }
        }

        function initPeer() {
            peer = new Peer(); 
            peer.on('open', id => {
                document.getElementById('my-id-display').innerText = id;
            });
            peer.on('connection', c => {
                conn = c;
                setupChat();
            });
        }

        function copyMyId() {
            const idText = document.getElementById('my-id-display').innerText;
            if(idText === "-- جاري التحميل --") return;
            navigator.clipboard.writeText(idText);
            
            // تغيير بسيط في الشكل للتأكيد على النسخ
            const container = document.querySelector('.copy-container');
            container.style.borderColor = "white";
            setTimeout(() => container.style.borderColor = "var(--primary)", 500);
            
            alert("تم نسخ الكود بنجاح 📋");
        }

        function connectToPeer() {
            const rId = document.getElementById('remoteId').value;
            if(!rId) return alert("دخل كود الطرف التاني!");
            conn = peer.connect(rId);
            setupChat();
        }

        function setupChat() {
            document.getElementById('connect-controls').innerHTML = "<div style='color:var(--primary); width:100%; text-align:center;'><b>تم الاتصال بنجاح ✅</b></div>";
            conn.on('data', data => displayMessage(data, 'other'));
        }

        function sendMsg() {
            const text = document.getElementById('msgIn').value;
            if(!text || !conn) return;
            const data = { type: 'text', content: text };
            conn.send(data);
            displayMessage(data, 'mine');
            document.getElementById('msgIn').value = '';
        }

        function sendFile(file) {
            const reader = new FileReader();
            reader.onload = () => {
                const data = { type: file.type.includes('image') ? 'image' : 'audio', content: reader.result };
                conn.send(data);
                displayMessage(data, 'mine');
            };
            reader.readAsDataURL(file);
        }

        function displayMessage(data, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + (sender === 'mine' ? 'mine' : '');
            if(data.type === 'text') div.innerText = data.content;
            if(data.type === 'image') div.innerHTML = `<img src="${data.content}">`;
            if(data.type === 'audio') div.innerHTML = `<audio src="${data.content}" controls style="width:200px"></audio>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        let mediaRecorder, chunks = [];
        document.getElementById('micBtn').onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = () => {
                        const data = { type: 'audio', content: reader.result };
                        conn.send(data);
                        displayMessage(data, 'mine');
                    };
                    reader.readAsDataURL(blob);
                    chunks = [];
                };
                mediaRecorder.start();
                document.getElementById('micBtn').style.color = "red";
            } else {
                mediaRecorder.stop();
                document.getElementById('micBtn').style.color = "white";
            }
        };
    </script>
</body>
</html>
