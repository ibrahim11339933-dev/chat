<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Space | Active</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b141a; --primary: #00a884; --outgoing: #005c4b; --incoming: #202c33; --text: #e9edef; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #auth { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1c272e; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 320px; border: 1px solid var(--primary); }
        
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(11, 20, 26, 0.93); background-blend-mode: overlay; }
        
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); word-wrap: break-word; }
        .mine { align-self: flex-end; background: var(--outgoing); border-top-right-radius: 0; }
        .other { align-self: flex-start; background: var(--incoming); border-top-left-radius: 0; }
        
        .controls { padding: 10px; background: #202c33; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: #2a3942; border: none; padding: 12px 15px; border-radius: 25px; color: white; outline: none; }
        .btn { cursor: pointer; font-size: 22px; color: #8696a0; background: none; border: none; }
        .send-btn { color: var(--primary); }
        
        img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        audio { filter: invert(1); height: 35px; width: 210px; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="login-box">
            <h2 style="color: var(--primary)">مساحتنا 🔒</h2>
            <input type="password" id="passCode" placeholder="كلمة السر" style="width:100%; padding:10px; text-align:center; background:#2a3942; color:white; border:none; border-radius:5px;">
            <button onclick="login()" style="background:var(--primary); color:white; width:100%; margin-top:15px; padding:10px; border:none; border-radius:5px; cursor:pointer;">دخول</button>
        </div>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div class="controls">
            <input type="file" id="fileIn" hidden onchange="uploadFile(this.files[0])">
            <button class="btn" onclick="document.getElementById('fileIn').click()">📎</button>
            <input type="text" id="msgText" placeholder="اكتب رسالة...">
            <button class="btn" id="micBtn">🎤</button>
            <button class="btn send-btn" onclick="sendMsg()">🕊️</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://aezykvadkbijwghxfexq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jX1BJrajDUieM4COc7G5PA_RJ2M4f7t'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // تعيين معرف فريد للجهاز لتمييز رسايلك عن رسايلها
        if(!localStorage.getItem('my_id')) {
            localStorage.setItem('my_id', 'id_' + Math.random().toString(36).substr(2, 9));
        }
        const MY_ID = localStorage.getItem('my_id');

        function login() {
            if(document.getElementById('passCode').value === '3117') {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('chat-area').style.display = 'flex';
                loadOldMessages();
                subscribeToNew();
            } else { alert("غلط!"); }
        }

        async function sendMsg() {
            const text = document.getElementById('msgText').value;
            if(!text) return;
            await supabaseClient.from('messages').insert([{ content: text, type: 'text', sender: MY_ID }]);
            document.getElementById('msgText').value = '';
        }

        async function loadOldMessages() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            if (data) data.forEach(msg => displayMessage(msg));
        }

        function subscribeToNew() {
            supabaseClient.channel('realtime_messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                displayMessage(payload.new);
            }).subscribe();
        }

        function displayMessage(msg) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ' + (msg.sender === MY_ID ? 'mine' : 'other');
            
            if(msg.type === 'text') div.innerText = msg.content;
            if(msg.type === 'image') div.innerHTML = `<img src="${msg.content}">`;
            if(msg.type === 'audio') div.innerHTML = `<audio src="${msg.content}" controls></audio>`;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        let mediaRecorder, chunks = [], startTime, timerInterval;
        document.getElementById('micBtn').onclick = async () => {
            const btn = document.getElementById('micBtn');
            const input = document.getElementById('msgText');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = async () => {
                        await supabaseClient.from('messages').insert([{ content: reader.result, type: 'audio', sender: MY_ID }]);
                    };
                    reader.readAsDataURL(blob);
                };
                mediaRecorder.start();
                btn.innerHTML = "🛑"; btn.style.color = "red";
                startTime = Date.now();
                timerInterval = setInterval(() => { input.placeholder = "تسجيل: " + Math.round((Date.now()-startTime)/1000) + "s"; }, 1000);
            } else {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                btn.innerHTML = "🎤"; btn.style.color = "#8696a0";
                input.placeholder = "اكتب رسالة...";
            }
        };

        function uploadFile(file) {
            const reader = new FileReader();
            reader.onload = async () => {
                await supabaseClient.from('messages').insert([{ content: reader.result, type: 'image', sender: MY_ID }]);
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
